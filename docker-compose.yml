# ===========================================================
# Docker Compose — Vendora (Next.js) + InsForge Self-Hosted
# ===========================================================
# ONE-LINER USAGE:
#   ./start.sh
#
# WHAT HAPPENS:
#   1. Clones https://github.com/insforge/insforge.git → ./insforge
#   2. Copies this project's .env.docker → .env (if not exists)
#   3. docker compose up -d --build
#
# ACCESS:
#   Vendora App        → http://localhost:3000
#   InsForge Dashboard → http://localhost:7131
#   InsForge API       → http://localhost:7130
#   PostgREST API      → http://localhost:5430
#   PostgreSQL         → localhost:5432 (optional direct access)
# ===========================================================

name: vendora

services:
  # ---------------------------------------------------------
  # PostgreSQL (InsForge official image)
  # ---------------------------------------------------------
  postgres:
    image: ghcr.io/insforge/postgres:v15.13.2
    container_name: vendora-postgres
    restart: unless-stopped
    # IMPORTANT: use the custom postgresql.conf that enables pg_cron,
    # http and pgcrypto. Without this, InsForge migration 021 will fail.
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c app.encryption_key='${ENCRYPTION_KEY:-${JWT_SECRET:-dev-secret-change-in-production}}'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Role init: must run before InsForge migrations
      - ./docker-init/db/db-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      # JWT secret init: must run before InsForge starts
      - ./docker-init/db/jwt.sql:/docker-entrypoint-initdb.d/02-jwt.sql
      # Config with pg_cron, http, pgcrypto preloaded
      - ./docker-init/db/postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - vendora-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # PostgREST
  # ---------------------------------------------------------
  postgrest:
    image: postgrest/postgrest:v12.2.12
    container_name: vendora-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-insforge}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:5430
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_CHANNEL_ENABLED: "true"
      PGRST_DB_CHANNEL: pgrst
    ports:
      - "${POSTGREST_PORT:-5430}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vendora-network

  # ---------------------------------------------------------
  # InsForge Backend (built from cloned repo)
  # ---------------------------------------------------------
  insforge:
    build:
      context: ./insforge
      dockerfile: Dockerfile
      target: runner
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:-http://localhost:7130}
        VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY:-}
    container_name: vendora-insforge
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started
    ports:
      - "${APP_PORT:-7130}:7130"
      - "${AUTH_PORT:-7131}:7131"
    environment:
      - PORT=7130
      - PROJECT_ROOT=/app
      - API_BASE_URL=${API_BASE_URL:-}
      - VITE_API_BASE_URL=${API_BASE_URL:-http://localhost:7130}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-this-password}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-insforge}
      - POSTGREST_BASE_URL=http://postgrest:3000
      - DENO_RUNTIME_URL=http://deno:7133
      - DENO_SUBHOSTING_TOKEN=${DENO_SUBHOSTING_TOKEN:-}
      - DENO_SUBHOSTING_ORG_ID=${DENO_SUBHOSTING_ORG_ID:-}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-52428800}
      - MAX_JSON_BODY_SIZE=${MAX_JSON_BODY_SIZE:-100mb}
      - MAX_URLENCODED_BODY_SIZE=${MAX_URLENCODED_BODY_SIZE:-10mb}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-}
      - AWS_REGION=${AWS_REGION:-}
      - AWS_CLOUDFRONT_URL=${AWS_CLOUDFRONT_URL:-}
      - AWS_CLOUDFRONT_KEY_PAIR_ID=${AWS_CLOUDFRONT_KEY_PAIR_ID:-}
      - AWS_CLOUDFRONT_PRIVATE_KEY=${AWS_CLOUDFRONT_PRIVATE_KEY:-}
      - VERCEL_TOKEN=${VERCEL_TOKEN:-}
      - VERCEL_TEAM_ID=${VERCEL_TEAM_ID:-}
      - VERCEL_PROJECT_ID=${VERCEL_PROJECT_ID:-}
      - DEPLOYMENT_ID=${DEPLOYMENT_ID:-}
      - PROJECT_ID=${PROJECT_ID:-}
      - APP_KEY=${APP_KEY:-}
      - ACCESS_API_KEY=${ACCESS_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - LINKEDIN_CLIENT_ID=${LINKEDIN_CLIENT_ID:-}
      - LINKEDIN_CLIENT_SECRET=${LINKEDIN_CLIENT_SECRET:-}
      - X_CLIENT_ID=${X_CLIENT_ID:-}
      - X_CLIENT_SECRET=${X_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_CLIENT_SECRET=${APPLE_CLIENT_SECRET:-}
      - LOGS_DIR=/insforge-logs
      - STORAGE_DIR=/insforge-storage
    volumes:
      - storage-data:/insforge-storage
      - shared-logs:/insforge-logs
    networks:
      - vendora-network

  # ---------------------------------------------------------
  # Deno Runtime (Edge Functions)
  # ---------------------------------------------------------
  deno:
    image: denoland/deno:alpine-2.0.6
    container_name: vendora-deno
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - postgres
      - postgrest
    ports:
      - "${DENO_PORT:-7133}:7133"
    environment:
      - PORT=7133
      - DENO_ENV=${DENO_ENV:-production}
      - DENO_DIR=/deno-dir
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-insforge}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGREST_BASE_URL=http://postgrest:3000
      - WORKER_TIMEOUT_MS=${WORKER_TIMEOUT_MS:-60000}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./insforge/functions:/app/functions
      - deno_cache:/deno-dir
    command: >
      sh -c "
        echo 'Downloading Deno dependencies...' &&
        deno cache functions/server.ts &&
        echo 'Starting Deno server on port 7133...' &&
        deno run --allow-net --allow-env --allow-read=./functions/worker-template.js functions/server.ts
      "
    networks:
      - vendora-network

  # ---------------------------------------------------------
  # Vendora (Next.js app)
  # ---------------------------------------------------------
  vendora:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSFORGE_BASE_URL: http://insforge:7130
        INSFORGE_STORAGE_PUBLIC_BASE_URL: http://insforge:7130/api/storage/buckets/images/objects
        INSFORGE_STORAGE_UPLOAD_BASE_URL: http://insforge:7130/api/storage/buckets/images/objects
        INSFORGE_STORAGE_BUCKET: images
        INSFORGE_API_KEY: ${ACCESS_API_KEY}
    container_name: vendora-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Next-auth needs this for internal API calls in getServerSideProps
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${JWT_SECRET}
      # Server-side only: internal Docker hostname for API calls
      - INSFORGE_BASE_URL=http://insforge:7130
      - POSTGREST_BASE_URL=http://postgrest:3000
      - INSFORGE_STORAGE_UPLOAD_BASE_URL=http://insforge:7130/api/storage/buckets/images/objects
      - INSFORGE_STORAGE_PUBLIC_BASE_URL=http://insforge:7130/api/storage/buckets/images/objects
      - INSFORGE_STORAGE_BUCKET=images
      - INSFORGE_API_KEY=${ACCESS_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    depends_on:
      - insforge
      - postgrest
      - postgres
    networks:
      - vendora-network

# ===========================================================
# Volumes
# ===========================================================
volumes:
  postgres-data:
    driver: local
  deno_cache:
    driver: local
  storage-data:
    driver: local
  shared-logs:
    driver: local

# ===========================================================
# Networks
# ===========================================================
networks:
  vendora-network:
    driver: bridge
